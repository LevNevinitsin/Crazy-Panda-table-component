<!--Необходимо разработать javascript-компонент для построения таблицы с дополнительными возможностями для пользователя.

Функционал:

1) Клиентская пагинация: данные необходимо отображать постранично,
максимум 50 элементов на страницу, необходимо предоставить пользовательскую навигацию для перехода по страницам.

2) Сортировка по столбцам: при нажатии на название столбца строки таблицы
сортируются по возрастанию, при повторном клике - по убыванию.

3) Фильтрация: компонент предоставляет текстовое поле, в которое пользователь может
ввести текст и строки таблицы, данные которых не содержат подстроку,
введённую пользователем, скрываются. Перефильтрация осуществляется на каждое изменение значения поля.-->
